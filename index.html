<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>CRICKCAST</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#05070a;
font-family:Poppins,sans-serif;
color:#fff;
}

header{
position:fixed;
top:0;
left:0;
right:0;
height:70px;
background:#0b0f14;
display:flex;
align-items:center;
justify-content:center;
border-bottom:1px solid rgba(0,255,170,.25);
z-index:9999;
}

.logo-text{
font-size:22px;
font-weight:700;
color:#00ffbf;
}

.video-container{
width:100%;
height:45vh;
background:#000;
margin-top:70px;
}

video{
width:100%;
height:100%;
background:#000;
}

.section-title{
padding:15px;
font-weight:600;
color:#00ffbf;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:14px;
padding:10px;
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
border:1px solid #222;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.card-title{
font-size:14px;
margin-bottom:6px;
}

.lang-btns{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.lang-btn{
background:#008cff;
color:#fff;
padding:6px 10px;
font-size:12px;
border-radius:6px;
cursor:pointer;
}

.lang-btn:hover{
background:#00aaff;
}

.social-float{
position:fixed;
right:20px;
bottom:25px;
display:flex;
flex-direction:column;
gap:12px;
}

.social-btn{
width:52px;
height:52px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#0088cc;
}

.social-btn img{
width:26px;
}

</style>
</head>

<body>

<header>
<span class="logo-text">CRICKCAST</span>
</header>

<div class="video-container">
<video id="video" controls autoplay playsinline></video>
</div>

<div class="section-title">● Live Matches</div>

<div class="grid">

<div class="card">
<img src="https://www.fancode.com/skillup-uploads/cms-media/Tillo-Cup-2026-old-card-.jpg">
<div class="card-body">
<div class="card-title">Lightning Legends Vs Nexage Hyderabad</div>
<div class="lang-btns">
<div class="lang-btn" onclick="loadStream('https://fancode.thecricsters.workers.dev/?id=141257&lang=english')">ENGLISH</div>
</div>
</div>
</div>

<div class="card">
<img src="https://www.fancode.com/skillup-uploads/cms-media/_Premier-League-T20-2026-2nd-old-card-.jpg">
<div class="card-body">
<div class="card-title">Hong Kong CC Vs USRC</div>
<div class="lang-btns">
<div class="lang-btn" onclick="loadStream('https://fancode.thecricsters.workers.dev/?id=140619&lang=english')">ENGLISH</div>
</div>
</div>
</div>

<div class="card">
<img src="https://www.fancode.com/skillup-uploads/cms-media/F1_Australia_web.jpg">
<div class="card-body">
<div class="card-title">F1 Australian Grand Prix</div>
<div class="lang-btns">

<div class="lang-btn" onclick="loadStream('https://fancode.thecricsters.workers.dev/?id=139365&lang=english')">ENGLISH</div>

<div class="lang-btn" onclick="loadStream('https://fancode.thecricsters.workers.dev/?id=139365&lang=hindi')">HINDI</div>

<div class="lang-btn" onclick="loadStream('https://fancode.thecricsters.workers.dev/?id=139365&lang=tamil')">TAMIL</div>

</div>
</div>
</div>

</div>

<div class="social-float">
<a href="https://t.me/+r_4JF-IieX0wNjU9" target="_blank" class="social-btn">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>
</div>

<script>

let player;

async function initPlayer(){

const video = document.getElementById('video');

player = new shaka.Player(video);

}

async function loadStream(url){

try{

await player.load(url);

window.scrollTo({top:0,behavior:"smooth"});

}catch(e){

console.log(e);

}

}

document.addEventListener("DOMContentLoaded",initPlayer);

</script>

</body>
  </html>
