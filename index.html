<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>CRICKCAST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  padding:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#0d0d0d,#1a1a2e);
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:70px;
  background: rgba(10,15,35,0.9);
  backdrop-filter: blur(12px);
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:2px solid rgba(56,189,248,0.5);
  z-index:9999;
}

.logo-wrapper{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-wrapper svg{
  width:36px;
  height:36px;
  fill:none;
  stroke:#38bdf8;
  stroke-width:3;
  filter: drop-shadow(0 0 12px #38bdf8);
}

.logo-text{
  font-size:24px;
  font-weight:700;
  color:#38bdf8;
  text-shadow: 0 0 15px #38bdf8;
}

/* POPUP */
.popup-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.75);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10002;
}

.popup-box{
  width:320px;
  background: rgba(20,25,45,0.95);
  border:1px solid rgba(56,189,248,0.4);
  border-radius:18px;
  backdrop-filter: blur(14px);
  padding:2rem;
  text-align:center;
  box-shadow:0 0 30px rgba(56,189,248,0.4);
  position:relative;
}

.close-btn{
  position:absolute;
  top:10px;
  right:15px;
  background:none;
  border:none;
  color:#38bdf8;
  font-size:22px;
  cursor:pointer;
}

.popup-btn{
  border-radius:12px;
  padding:14px 0;
  font-weight:600;
  cursor:pointer;
  border:none;
  transition:0.3s;
}

.join-btn{
  background: linear-gradient(135deg,#38bdf8,#2563eb);
  color:#fff;
  box-shadow: 0 0 12px #38bdf8;
}

.join-btn:hover{
  transform: scale(1.05);
  box-shadow: 0 0 20px #38bdf8;
}

.already-btn{
  background: rgba(255,255,255,0.12);
  color:#fff;
}

/* VIDEO CONTAINER */
.video-container{
  width:100%;
  height:50vh;
  margin-top:70px;
  position:relative;
  border-radius:6px;
  overflow:hidden;
  box-shadow:0 0 25px rgba(56,189,248,0.2) inset;
  background:#000;
}

/* LIVE badge */
.live-badge{
  position:absolute;
  top:10px;
  left:12px;
  background:red;
  color:white;
  padding:4px 10px;
  font-size:12px;
  font-weight:700;
  border-radius:6px;
  box-shadow:0 0 12px rgba(255,0,0,0.8);
  animation: blink 1s infinite;
  z-index:5;
}

@keyframes blink{
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0.3;}
}

/* VIDEO TAG */
#player{
  width:100%;
  height:100%;
  background:#000;
}

/* SECTIONS */
.section-box{
  width:92%;
  margin:20px auto;
  padding:20px;
  border-radius:16px;
  text-align:center;
  background: rgba(15,23,42,0.95);
  border:1px solid rgba(56,189,248,0.25);
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.section-title{
  color:#38bdf8;
  font-size:18px;
  margin-bottom:10px;
}

.action-btn{
  width:100%;
  padding:14px 0;
  border-radius:12px;
  border:none;
  background: linear-gradient(135deg,#38bdf8,#2563eb);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.action-btn:hover{
  transform: scale(1.05);
  box-shadow:0 0 20px #38bdf8;
}

/* SOCIAL FLOAT */
.social-float{
  position:fixed;
  right:20px;
  bottom:25px;
  display:flex;
  flex-direction:column;
  gap:14px;
  z-index:99999;
}

.social-btn{
  width:56px;
  height:56px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 18px rgba(56,189,248,0.7);
  transition:0.3s;
}

.social-btn:hover{
  transform: scale(1.1);
  box-shadow:0 0 28px rgba(56,189,248,1);
}

.social-btn img{
  width:28px;
  height:28px;
}

.social-btn.telegram{
  background:#0088cc;
}

.social-btn.instagram{
  background:radial-gradient(circle at 30% 110%,
    #fdf497 0%, #fdf497 5%, #fd5949 45%,
    #d6249f 60%, #285AEB 90%);
}
</style>
</head>
<body>

<div class="popup-overlay" id="popup">
  <div class="popup-box">
    <button class="close-btn" onclick="closePopup()">×</button>
    <div>Support Us 🤝</div>
    <div>Join our Channel for live matches and instant updates..</div>
    <div class="popup-buttons">
      <a href="https://t.me/+r_4JF-IieX0wNjU9" target="_blank" class="popup-btn join-btn">Join Now</a>
      <button class="popup-btn already-btn" onclick="closePopup()">Already Joined</button>
    </div>
  </div>
</div>

<header>
  <div class="logo-wrapper">
    <svg viewBox="0 0 64 64">
      <path d="M20 14 L24 20 L32 14 L40 20 L44 14 L44 24 H20 Z"/>
      <path d="M32 8 L10 18 V32 C10 48 21 58 32 60 C43 58 54 48 54 32 V18 Z"/>
    </svg>
    <span class="logo-text">CRICKCAST</span>
  </div>
</header>

<div class="video-container">
  <div class="live-badge">LIVE</div>
  <video id="player" controls autoplay></video>
</div>

<div class="section-box">
  <div class="section-title">🔔 Follow Us for Updates</div>
  <a href="https://t.me/+r_4JF-IieX0wNjU9" target="_blank">
    <button class="action-btn">Join Telegram Channel</button>
  </a>
</div>

<div class="section-box">
  <div class="section-title">🔗 Share This Page</div>
  <button class="action-btn" onclick="navigator.clipboard.writeText(window.location.href); alert('Link Copied');">
    Copy & Share This Page
  </button>
</div>

<div class="social-float">
  <a href="https://t.me/+r_4JF-IieX0wNjU9" target="_blank" class="social-btn telegram">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
  </a>
  <a href="https://www.instagram.com/crickcast.live" target="_blank" class="social-btn instagram">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.3.5"></script>
<script>
// Replace below with your full .m3u8 link
const video = document.getElementById('player');
const streamURL = 'https://allrounder-live.pages.dev/star/star-1-hindi';

if(Hls.isSupported()){
  const hls = new Hls();
  hls.loadSource(streamURL);
  hls.attachMedia(video);
  hls.on(Hls.Events.MANIFEST_PARSED,function(){
    video.play();
  });
}else if(video.canPlayType('application/vnd.apple.mpegurl')){
  video.src = streamURL;
  video.addEventListener('loadedmetadata',function(){
    video.play();
  });
}

function closePopup(){
  document.getElementById('popup').style.display='none';
}
</script>

</body>
  </html>
